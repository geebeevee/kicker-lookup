<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive Deep Dive – Kicker's Music League</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    /* ── Deep Dive specific styles ─────────────────────────────────── */
    .dd-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 40px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Tab bar */
    .dd-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0;
    }
    .dd-tab {
      padding: 9px 18px;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      background: var(--bg-alt);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
      position: relative;
      bottom: -2px;
    }
    .dd-tab:hover  { background: var(--hover); }
    .dd-tab.active {
      background: var(--card-bg);
      border-bottom: 2px solid var(--card-bg);
      color: var(--link);
    }

    /* Panels */
    .dd-panel { display: none; }
    .dd-panel.active { display: block; }

    /* Cards */
    .dd-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .dd-card h3 { margin: 0 0 6px; font-size: 17px; }
    .dd-card h4 { margin: 0 0 4px; font-size: 15px; }
    .dd-card p  { margin: 4px 0; font-size: 14px; opacity: 0.85; }

    /* Controls */
    .dd-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .dd-select, .dd-input {
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 15px;
      flex: 1;
      min-width: 160px;
    }
    .dd-select:focus, .dd-input:focus { outline: 2px solid var(--link); }

    /* Round rows */
    .round-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .round-row:last-child { border-bottom: none; }
    .round-num  { font-size: 12px; opacity: 0.5; min-width: 24px; }
    .round-name { font-weight: 600; font-size: 15px; flex: 1; }
    .round-desc { font-size: 13px; opacity: 0.7; flex: 2; font-style: italic; }
    .round-link { font-size: 13px; white-space: nowrap; }
    .round-winner {
      font-size: 12px;
      background: var(--bg-alt);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    /* Hall of fame tables */
    .hof-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .hof-table th {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 2px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.6;
    }
    .hof-table td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .hof-table tr:last-child td { border-bottom: none; }
    .hof-table tr:hover td { background: var(--hover); }
    .hof-rank {
      font-weight: 700;
      font-size: 16px;
      opacity: 0.35;
      width: 32px;
    }
    .medal-1 { color: #f5a623; }
    .medal-2 { color: #9b9b9b; }
    .medal-3 { color: #c8794a; }

    /* Score pill */
    .score-pill {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
    }
    .score-high { background: #d4edda; color: #155724; }
    .score-low  { background: #f8d7da; color: #721c24; }
    .score-mid  { background: var(--bg-alt); color: var(--text); }
    body.dark .score-high { background: #1a3d27; color: #7ed9a0; }
    body.dark .score-low  { background: #3d1a1e; color: #f08090; }

    /* Member search */
    .member-suggestion-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 4px;
      max-height: 220px;
      overflow-y: auto;
      display: none;
      position: absolute;
      width: calc(100% - 40px);
      z-index: 1000;
      box-shadow: 0 4px 12px var(--shadow);
    }
    .member-suggestion {
      padding: 9px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .member-suggestion:hover { background: var(--hover); }
    .member-wrap { position: relative; flex: 1; }

    /* Vote comment styling */
    .vote-comment {
      font-size: 13px;
      opacity: 0.75;
      font-style: italic;
      margin-top: 3px;
    }
    .vote-pts-pos { color: #22863a; font-weight: 700; }
    .vote-pts-neg { color: #cb2431; font-weight: 700; }
    .vote-pts-zer { opacity: 0.5; font-weight: 600; }
    body.dark .vote-pts-pos { color: #7ed9a0; }
    body.dark .vote-pts-neg { color: #f08090; }

    /* Stat summary row */
    .stat-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .stat-box {
      background: var(--bg-alt);
      border-radius: 8px;
      padding: 10px 16px;
      flex: 1;
      min-width: 100px;
      text-align: center;
    }
    .stat-box .stat-val { font-size: 22px; font-weight: 700; }
    .stat-box .stat-lbl { font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Loading / empty */
    .dd-loading { opacity: 0.6; font-style: italic; padding: 20px 0; }
    .dd-empty   { opacity: 0.5; padding: 20px 0; font-size: 14px; }

    /* Playlist link */
    a.playlist-link {
      color: #1db954;
      text-decoration: none;
      font-weight: 600;
    }
    a.playlist-link:hover { text-decoration: underline; }

    /* Section headers within panels */
    .dd-section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.5;
      margin: 22px 0 10px;
    }

    /* Divider between member submission groups */
    .member-league-header {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.45;
      padding: 14px 0 6px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .member-league-header:first-of-type { border-top: none; margin-top: 0; }
  </style>
</head>
<body>
<header>
  <h1>📼 Archive Deep Dive</h1>
  <p>Kicker's Music League — all the data, all the history</p>
  <div style="margin-top:10px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
    <button onclick="location.href='index.html'" class="switch-button">🎧 Artist Search</button>
    <button onclick="location.href='songs.html'" class="switch-button">🎵 Song Search</button>
  </div>
</header>

<div class="dd-container">

  <!-- Tab bar -->
  <div class="dd-tabs">
    <button class="dd-tab active" data-tab="league">🏆 League Summary</button>
    <button class="dd-tab" data-tab="member">👤 Member Profile</button>
    <button class="dd-tab" data-tab="hof">🌟 Hall of Fame</button>
  </div>

  <!-- ── PANEL 1: League Summary ──────────────────────────────────── -->
  <div class="dd-panel active" id="panel-league">
    <div class="dd-controls">
      <select class="dd-select" id="leagueSelect">
        <option value="">— Select a league —</option>
      </select>
    </div>
    <div id="leagueContent"><p class="dd-empty">Select a league above to see its rounds and results.</p></div>
  </div>

  <!-- ── PANEL 2: Member Profile ─────────────────────────────────── -->
  <div class="dd-panel" id="panel-member">
    <div class="dd-controls">
      <div class="member-wrap">
        <input class="dd-input" id="memberInput" placeholder="Start typing a member name…" autocomplete="off" />
        <div class="member-suggestion-box" id="memberSuggestions"></div>
      </div>
    </div>
    <div id="memberContent"><p class="dd-empty">Search for a league member above.</p></div>
  </div>

  <!-- ── PANEL 3: Hall of Fame ───────────────────────────────────── -->
  <div class="dd-panel" id="panel-hof">
    <p class="dd-loading" id="hofLoading">Loading archive data…</p>
    <div id="hofContent" style="display:none;"></div>
  </div>

</div>

<footer>
  <button id="darkToggle">Dark Mode Toggle</button>
  <p>Kicker's Music League Archive</p>
</footer>

<script src="deepdive.js"></script>
</body>
</html>
